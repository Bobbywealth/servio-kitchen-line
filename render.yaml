services:
  - type: web
    name: servio-kitchen-line
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install
    startCommand: node server/index.js
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "5001"
      # Optional: comma-separated CORS origins to allow (default: all onrender.com + localhost)
      # - key: ALLOWED_ORIGINS
      #   value: "https://servio-app.onrender.com,https://servio-restaurant-platform.onrender.com"
    autoDeploy: true
